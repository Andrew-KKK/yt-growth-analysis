name: YouTube Daily Snapshot

on:
  schedule:
    - cron: '0 4,10,16,22 * * *'
  workflow_dispatch: # 這是手動按鈕的開關

jobs:
  run-fetcher:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 檢出最新代碼 (Checkout)
        uses: actions/checkout@v4 # 升級到 v4 以符合 GitHub 建議

      - name: 2. 設定 Python 環境
        uses: actions/setup-python@v5 # 升級到 v5
        with:
          python-version: '3.10'

      - name: 3. 安裝必要套件
        run: |
          pip install -r requirements.txt

      - name: 4. 執行數據採集
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python fetch_yt_data.py
