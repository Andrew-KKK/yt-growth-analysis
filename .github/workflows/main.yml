name: YouTube Snapshot & Live Tracking

on:
  schedule:
    # 每 30 分鐘執行一次 (整點與 30 分)
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  run-fetcher:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch script and print logs
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          YT_API_KEY_2: ${{ secrets.YT_API_KEY_2 }} # 老闆如果有第二組 Key 請加到 Secrets
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python fetch_yt_data.py
